<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIIZE 《II》聖地巡禮</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
  header{background:#fff;border-bottom:0.5px solid #e0ddd6;padding:16px 20px;position:sticky;top:0;z-index:100}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .logo{font-size:15px;font-weight:600;letter-spacing:.02em}
  .logo span{color:#9b8fd4}
  .filter-wrap{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .filter-wrap::-webkit-scrollbar{display:none}
  .pill{flex-shrink:0;font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;border:0.5px solid #d0cdc6;background:#fff;color:#555;cursor:pointer;transition:all .15s;white-space:nowrap}
  .pill.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .pill.member-SHOTARO.active{background:#378ADD;border-color:#378ADD}
  .pill.member-EUNSEOK.active{background:#EF9F27;border-color:#EF9F27}
  .pill.member-SUNGCHAN.active{background:#639922;border-color:#639922}
  .pill.member-WONBIN.active{background:#7F77DD;border-color:#7F77DD}
  .pill.member-SOHEE.active{background:#D4537E;border-color:#D4537E}
  .pill.member-ANTON.active{background:#BA7517;border-color:#BA7517}
  .pill.day-1.active{background:#534AB7;border-color:#534AB7}
  .pill.day-2.active{background:#0F6E56;border-color:#0F6E56}
  .pill.day-3.active{background:#993C1D;border-color:#993C1D}
  .pill.day-4.active{background:#A32D2D;border-color:#A32D2D}
  .pill.day-5.active{background:#3C3489;border-color:#3C3489}
  .tab-bar{display:flex;gap:0;margin-bottom:0}
  .tab{flex:1;text-align:center;font-size:13px;font-weight:500;padding:8px 0;color:#888;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
  .tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a}
  main{padding:16px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .card{background:#fff;border-radius:14px;overflow:hidden;border:0.5px solid #e8e5de;cursor:pointer;transition:transform .1s}
  .card:active{transform:scale(.98)}
  .card-img{position:relative;width:100%;aspect-ratio:1;overflow:hidden;background:#eee}
  .card-img img{width:100%;height:100%;object-fit:cover;display:block}
  .card-img .badge-day{position:absolute;top:8px;left:8px;font-size:10px;font-weight:600;padding:3px 7px;border-radius:10px;background:rgba(0,0,0,.55);color:#fff;backdrop-filter:blur(4px)}
  .card-body{padding:9px 10px 11px}
  .card-name{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-addr{font-size:10px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
  .card-tags{display:flex;gap:4px;flex-wrap:wrap}
  .tag{font-size:10px;font-weight:500;padding:2px 6px;border-radius:8px}
  .tag-member{background:#f0eeff;color:#534AB7}
  .tag-type{background:#e8f5ee;color:#0F6E56}
  .empty{text-align:center;padding:60px 20px;color:#aaa;font-size:14px}

  /* Modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .modal-imgs{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
  .modal-imgs::-webkit-scrollbar{height:3px}
  .modal-imgs::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
  .modal-img-track{display:flex;gap:2px}
  .modal-img-track img{flex:0 0 80vw;max-width:320px;height:220px;object-fit:cover;scroll-snap-align:start;border-radius:0}
  .modal-body{padding:16px 18px 32px}
  .modal-tags{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .modal-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:12px}
  .modal-name{font-size:20px;font-weight:700;margin-bottom:4px}
  .modal-addr{font-size:13px;color:#666;margin-bottom:14px;line-height:1.5}
  .modal-divider{border:none;border-top:0.5px solid #e8e5de;margin:12px 0}
  .modal-source{font-size:13px;color:#555;display:flex;align-items:center;gap:6px}
  .modal-source a{color:#378ADD;text-decoration:none;font-weight:500}
  .modal-map{margin-top:12px;border-radius:12px;overflow:hidden;border:0.5px solid #e8e5de}
  .modal-map iframe{width:100%;height:200px;border:none;display:block}
  .modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
  .modal-top{position:relative}
  .drag-handle{width:36px;height:4px;background:#e0ddd6;border-radius:2px;margin:10px auto 0}
  .count{font-size:12px;color:#aaa;margin-left:auto}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">RIIZE <span>《II》</span> 聖地巡禮</div>
    <span class="count" id="count"></span>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('member')">依成員</div>
    <div class="tab" onclick="switchTab('day')">依 DAY</div>
  </div>
  <div style="margin-top:10px">
    <div class="filter-wrap" id="filter-wrap"></div>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">沒有符合的景點</div>
</main>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-top">
      <div class="drag-handle"></div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
      <div class="modal-imgs"><div class="modal-img-track" id="modal-imgs"></div></div>
    </div>
    <div class="modal-body">
      <div class="modal-tags" id="modal-tags"></div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-addr" id="modal-addr"></div>
      <hr class="modal-divider">
      <div class="modal-source" id="modal-source"></div>
      <div class="modal-map" id="modal-map"></div>
    </div>
  </div>
</div>

<script>
const spots = [
  {
    id: 1,
    name: "あけび屋珈琲",
    addr: "神奈川県足柄下郡真鶴町岩242-1",
    member: "EUNSEOK",
    day: "DAY 2",
    type: "Coffee Shop",
    mapsUrl: "https://maps.app.goo.gl/rXcWfcSs2qcBYo586",
    mapsEmbed: "https://maps.google.com/maps?q=Akebiya+Coffee+Manazuru&output=embed&z=15",
    sourceName: "RIIZE llog",
    sourceUrl: "https://www.riizeofficial.com/trips/38386b24-6640-459c-8704-300cea534b63/stops/48dae6da-db1d-48bb-af22-a7175e156a56",
    imgs: [
      "https://druv7mpvk8qsc.cloudfront.net/media/jhx5x3y2/jhx5x3y2-image-2200.jpg",
      "https://druv7mpvk8qsc.cloudfront.net/media/98una5dd/98una5dd-image-2200.jpg",
      "https://druv7mpvk8qsc.cloudfront.net/media/69gdmmms/69gdmmms-image-2200.jpg",
      "https://druv7mpvk8qsc.cloudfront.net/media/75kjrf75/75kjrf75-image-2200.jpg",
      "https://druv7mpvk8qsc.cloudfront.net/media/xzxxsr6d/xzxxsr6d-image-2200.jpg",
      "https://druv7mpvk8qsc.cloudfront.net/media/bmvb5kd6/bmvb5kd6-image-2200.jpg",
      "https://druv7mpvk8qsc.cloudfront.net/media/9jhr4967/9jhr4967-image-2200.jpg",
    ]
  }
];

const memberColors = {
  SHOTARO:'#378ADD', EUNSEOK:'#EF9F27', SUNGCHAN:'#639922',
  WONBIN:'#7F77DD', SOHEE:'#D4537E', ANTON:'#BA7517'
};
const dayColors = {
  'DAY 1':'#534AB7','DAY 2':'#0F6E56','DAY 3':'#993C1D','DAY 4':'#A32D2D','DAY 5':'#3C3489'
};
const members = ['SHOTARO','EUNSEOK','SUNGCHAN','WONBIN','SOHEE','ANTON'];
const days = ['DAY 1','DAY 2','DAY 3','DAY 4','DAY 5'];

let currentTab = 'member';
let activeFilter = 'all';

function switchTab(tab) {
  currentTab = tab;
  activeFilter = 'all';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='member')||(i===1&&tab==='day')));
  buildFilters();
  renderGrid();
}

function buildFilters() {
  const wrap = document.getElementById('filter-wrap');
  const items = currentTab === 'member' ? members : days;
  wrap.innerHTML = `<div class="pill active" onclick="setFilter('all',this)">全部</div>` +
    items.map(v => {
      const cls = currentTab==='member' ? `member-${v}` : `day-${v.replace(' ','-').toLowerCase()}`;
      return `<div class="pill ${cls}" onclick="setFilter('${v}',this)">${v}</div>`;
    }).join('');
}

function setFilter(val, el) {
  activeFilter = val;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const filtered = spots.filter(s => activeFilter==='all' || (currentTab==='member'?s.member:s.day) === activeFilter);
  document.getElementById('count').textContent = filtered.length + ' 個景點';
  if (!filtered.length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(s => {
    const mColor = memberColors[s.member] || '#888';
    const dColor = dayColors[s.day] || '#888';
    return `<div class="card" onclick="openModal(${s.id})">
      <div class="card-img">
        <img src="${s.imgs[0]}" alt="${s.name}" loading="lazy">
        <span class="badge-day">${s.day}</span>
      </div>
      <div class="card-body">
        <div class="card-name">📍 ${s.name}</div>
        <div class="card-addr">${s.addr}</div>
        <div class="card-tags">
          <span class="tag tag-member" style="background:${mColor}22;color:${mColor}">${s.member}</span>
          <span class="tag tag-type">${s.type}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openModal(id) {
  const s = spots.find(x => x.id===id);
  if (!s) return;
  const mColor = memberColors[s.member] || '#888';
  const dColor = dayColors[s.day] || '#888';
  document.getElementById('modal-name').textContent = '📍 ' + s.name;
  document.getElementById('modal-addr').textContent = s.addr;
  document.getElementById('modal-tags').innerHTML =
    `<span class="modal-tag" style="background:${dColor}22;color:${dColor}">${s.day}</span>
     <span class="modal-tag" style="background:${mColor}22;color:${mColor}">${s.member}</span>
     <span class="modal-tag" style="background:#e8f5ee;color:#0F6E56">${s.type}</span>`;
  document.getElementById('modal-imgs').innerHTML = s.imgs.map(u =>
    `<img src="${u}" alt="${s.name}" loading="lazy">`).join('');
  document.getElementById('modal-source').innerHTML =
    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
     同款來源：<a href="${s.sourceUrl}" target="_blank">${s.sourceName}</a>`;
  document.getElementById('modal-map').innerHTML =
    `<iframe src="${s.mapsEmbed}" allowfullscreen loading="lazy"></iframe>`;
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-bg')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

buildFilters();
renderGrid();
</script>
</body>
</html>
